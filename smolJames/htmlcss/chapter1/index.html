<!-- Everything should be organized to keep sanity -->

<!DOCTYPE html>
<html lang="en">
<!-- everything in the head that specifies metadata is very important for SEO -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css"/>
  <title>Cats Galore</title>
</head>

<body>
  <header>
      <h1>cats website</h1>
      <nav style="color: blue; background: yellow;">
        <a href="#footer">
          <p>Footer</p>
        </a>
        <a href="https://www.google.com">
          <p>Gewgle</p>
        </a>
      </nav>
  </header>
  <main>    
    <section>
    
      <h2>everything you should know about cats!</h2>
    
      <!-- paragraph tag -->
      <p class ="paragraph header">cats are fascinating species with incredible intellect.
        this website serves to glorify their majesty</p>
    </section>
    
    <section>
      <div id="first-div">
                    <!-- can use px, %,  -->
        <img style="width: 100px;" src="https://dcist.com/wp-content/uploads/sites/3/2020/02/wilford_newsletter.jpg" alt="cat_picture">
        <!-- anchor tag -->
        <!-- _blank opens link in a new tab instead of opening in the same tab -->
        <a href="https://dcist.com/wp-content/uploads/sites/3/2020/02/wilford_newsletter.jpg"
           target="_blank">
           <p>click here for more cat images</p>
      </div>
      </a>
      <form>
        <label>
          <p>Cat Breed</p>
          <input style ="width: 1000px"
          placeholder ="Name of cat"
        </label>
        <button>
          <p>submit</p>
        </button>
      </form>
    </section>
  </main>
  <footer id="footer">
      Copyright 2026
  </footer>
</body>
</html>
